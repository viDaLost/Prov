<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f3eadc" />
  <meta name="color-scheme" content="light" />
  <title>Маша + Даня — свадебное приглашение</title>
  <meta name="description" content="Свадебное приглашение Маши и Дани — 26 августа 2026 года." />
  <link rel="preload" as="image" href="assets/section-1@2x.webp" imagesrcset="assets/section-1.webp 1x, assets/section-1@2x.webp 2x" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="paper-noise" aria-hidden="true"></div>
  <div id="preloader" class="preloader" aria-live="polite">
    <div class="preloader__card">
      <span class="preloader__heart">♥</span>
      <span>Открываем приглашение…</span>
    </div>
  </div>

  <main class="site-shell" aria-label="Свадебное приглашение Маши и Дани">
    <section class="art-section art-section--first" aria-label="Дата, календарь и локация">
      <picture>
        <source srcset="assets/section-1.webp 1x, assets/section-1@2x.webp 2x" type="image/webp" />
        <img src="assets/section-1.png" alt="Маша + Даня = любовь. Дата свадьбы, календарь и локация." width="768" height="2048" fetchpriority="high" decoding="async" />
      </picture>

      <button id="calendarHeart" class="calendar-heart" type="button" aria-label="Добавить свадьбу в календарь">
        <svg viewBox="0 0 100 92" aria-hidden="true" focusable="false">
          <path d="M50 84S8 58 8 30C8 15 18 6 31 6c8 0 15 5 19 12C54 11 61 6 69 6c13 0 23 9 23 24 0 28-42 54-42 54Z" />
          <text x="50" y="55" text-anchor="middle">26</text>
        </svg>
        <span class="calendar-heart__spark calendar-heart__spark--one">✦</span>
        <span class="calendar-heart__spark calendar-heart__spark--two">♥</span>
        <span class="calendar-heart__spark calendar-heart__spark--three">✦</span>
      </button>

      <a class="hotspot hotspot--map hotspot--registration" data-action="registration-map" href="#" aria-label="Построить маршрут до ЗАГСа"></a>
      <a class="hotspot hotspot--map hotspot--banquet" data-action="banquet-map" href="#" aria-label="Построить маршрут до банкета"></a>
    </section>

    <section class="art-section" aria-label="Тайминг и пожелания">
      <picture>
        <source srcset="assets/section-2.webp 1x, assets/section-2@2x.webp 2x" type="image/webp" />
        <img src="assets/section-2.png" alt="Тайминг свадебного дня и пожелания гостям." width="768" height="2048" loading="lazy" decoding="async" />
      </picture>
    </section>

    <section class="art-section art-section--last" aria-label="Дресс-код, воспоминания, анкета и обратный отсчёт">
      <picture>
        <source srcset="assets/section-3.webp 1x, assets/section-3@2x.webp 2x" type="image/webp" />
        <img src="assets/section-3.png" alt="Дресс-код, воспоминания, анкета и обратный отсчёт до свадьбы." width="768" height="2048" loading="lazy" decoding="async" />
      </picture>

      <button class="hotspot hotspot--memory" data-action="memories" type="button" aria-label="Открыть чат воспоминаний"></button>
      <button class="hotspot hotspot--form" data-action="form" type="button" aria-label="Заполнить анкету"></button>

      <div class="live-countdown" aria-label="Обратный отсчёт до свадьбы">
        <span><b data-count="days">--</b></span>
        <span><b data-count="hours">--</b></span>
        <span><b data-count="minutes">--</b></span>
        <span><b data-count="seconds">--</b></span>
      </div>
    </section>
  </main>

  <button id="scrollTop" class="scroll-top" type="button" aria-label="Наверх">↑</button>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <dialog id="memoryDialog" class="modal">
    <form method="dialog" class="modal__card">
      <button class="modal__close" value="close" aria-label="Закрыть">×</button>
      <h2>Воспоминания</h2>
      <p>Ссылка на Telegram-группу пока не указана. Добавьте её в <code>config.js</code> в поле <b>memoriesUrl</b>, и кнопка начнёт открывать чат.</p>
      <button class="modal__button" value="close">Понятно</button>
    </form>
  </dialog>

  <dialog id="rsvpDialog" class="modal">
    <form id="rsvpForm" class="modal__card modal__card--form">
      <button class="modal__close" type="button" data-close="rsvp" aria-label="Закрыть">×</button>
      <h2>Анкета гостя</h2>
      <label>
        <span>Ваше имя</span>
        <input name="name" autocomplete="name" required placeholder="Например, Анна" />
      </label>
      <label>
        <span>Вы сможете прийти?</span>
        <select name="attendance" required>
          <option value="Да, буду">Да, буду</option>
          <option value="Буду с гостем">Буду с гостем</option>
          <option value="Пока не уверен(а)">Пока не уверен(а)</option>
          <option value="Не смогу">Не смогу</option>
        </select>
      </label>
      <label>
        <span>Комментарий</span>
        <textarea name="comment" rows="3" placeholder="Пожелания, питание, важные детали"></textarea>
      </label>
      <button class="modal__button" type="submit">Сохранить ответ</button>
      <p class="modal__hint">Ответ сохранится на устройстве. Для сбора ответов онлайн вставьте ссылку на вашу анкету в <code>config.js</code>.</p>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
